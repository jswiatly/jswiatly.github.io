<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Holiano Dev</title>
  </head>
  <body>
    <main id="terminal">
      <div id="history">
        <div class="output">
          Initializing Connection... Connection established. Welcome to
          Holiano.dev - Vision in Depth. Type 'help' for available commands.
        </div>
      </div>

      <div id="input-line" class="terminal-line"></div>
        <span class="prompt" aria-hidden="true">[user@holiano-dev ~]$</span>
        <label for="cmd-input" class="visually-hidden">Type command:</label>
        <input
          type="text"
          id="cmd-input"
          autocomplete="off"
          autofocus
          spellcheck="false"
        />
      </div>
    </main>

    <script src="/js/main.js"></script>
  </body>
</html>
